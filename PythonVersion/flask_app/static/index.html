<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diwan Printer Control</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="container">
    <h1>Diwan Printer Control</h1>

    <section class="card">
      <h2>Main Actions</h2>
      <div class="button-row">
        <button id="captureBtn" class="primary">Capture</button>
        <button id="printBtn" class="primary">Print</button>
        <button id="uploadBtn" class="primary">Upload</button>
        <button id="changePenBtn" class="primary">ChangePen</button>
        <button id="statusBtn" class="primary">Status</button>
      </div>
      <input id="svgFileInput" type="file" accept=".svg,image/svg+xml" hidden>
    </section>

    <section class="card">
      <h2>Printer Connection</h2>
      <div class="grid">
        <label>COM/TTY Port
          <input id="comPort" type="text" placeholder="COM5 or /dev/ttyUSB0">
        </label>
        <label>Baud Rate
          <input id="baudRate" type="number" value="250000">
        </label>
      </div>
      <div class="secondary-row">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn">Disconnect</button>
        <button id="voidBtn">Void</button>
        <button id="resetBtn">Reset</button>
      </div>
    </section>

    <section class="card">
      <h2>Print Settings</h2>
      <div class="grid">
        <label>Width
          <input id="width" type="text" value="210mm">
        </label>
        <label>Height
          <input id="height" type="text" value="297mm">
        </label>
        <label>X Position
          <input id="xPosition" type="text" value="50mm">
        </label>
        <label>Y Position
          <input id="yPosition" type="text" value="50mm">
        </label>
        <label>Scale
          <input id="scale" type="number" value="1" min="1">
        </label>
        <label>Rotation
          <input id="rotation" type="number" value="0" min="0" max="360">
        </label>
      </div>
      <div class="grid">
        <label class="checkbox">
          <input id="invertX" type="checkbox">
          Invert X
        </label>
        <label class="checkbox">
          <input id="invertY" type="checkbox" checked>
          Invert Y
        </label>
        <label>Change Pen Mode
          <select id="penMode">
            <option value="start">start</option>
            <option value="finish">finish</option>
          </select>
        </label>
      </div>
      <p id="uploadedSvgLabel">Uploaded SVG: none</p>
    </section>

    <section class="card">
      <h2>Captured Photo</h2>
      <img id="capturePreview" alt="Latest captured photo" />
    </section>

    <section class="card">
      <h2>Status</h2>
      <pre id="statusBox">{}</pre>
    </section>

    <section class="card">
      <h2>Operation Log</h2>
      <div id="logBox" class="log-box"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
