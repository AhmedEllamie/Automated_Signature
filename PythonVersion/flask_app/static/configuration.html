<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Automated Signature - Configuration</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Automated Signature</h1>
      <a class="nav-link" href="/">Main</a>
    </header>

    <section class="config-grid">
      <section class="card">
        <h2>Printer Connection</h2>
        <p class="muted small-print">Baud rate is fixed at 250000.</p>
        <div class="connection-scan-row">
          <label>COM/TTY Port
            <input id="comPort" type="text" list="comPortList" placeholder="COM5 or /dev/ttyUSB0" autocomplete="off">
            <datalist id="comPortList"></datalist>
          </label>
          <button id="scanPortsBtn" type="button">Scan ports</button>
        </div>
        <div class="secondary-row">
          <button id="connectBtn">Connect</button>
          <button id="disconnectBtn">Disconnect</button>
        </div>
      </section>

      <section class="card">
        <h2>Printer Settings</h2>
        <div class="settings-row-pair">
          <label>Height
            <input id="height" type="text" value="297mm">
          </label>
          <label>Width
            <input id="width" type="text" value="210mm">
          </label>
        </div>
        <div class="settings-row-pair">
          <label>X Position
            <input id="xPosition" type="text" value="50mm">
          </label>
          <label>Y Position
            <input id="yPosition" type="text" value="50mm">
          </label>
        </div>
        <div class="settings-row-pair">
          <label>Scale
            <input id="scale" type="number" value="1" min="1">
          </label>
          <label>Rotation
            <input id="rotation" type="number" value="0" min="0" max="360">
          </label>
        </div>
        <div class="settings-row-pair settings-check-row">
          <label class="checkbox">
            <input id="invertX" type="checkbox">
            Invert X
          </label>
          <label class="checkbox">
            <input id="invertY" type="checkbox" checked>
            Invert Y
          </label>
        </div>

        <div class="settings-row-pair">
          <label>Pen max distance (m)
            <input id="penMaxDistanceM" type="number" min="0" step="0.01" placeholder="e.g. 2.5">
          </label>
          <div class="field-actions">
            <button id="setPenMaxBtn" type="button">Set pen max distance</button>
          </div>
        </div>

        <div class="pen-mode-block">
          <label>Change Pen Mode
            <select id="penMode">
              <option value="start">start</option>
              <option value="finish">finish</option>
            </select>
          </label>
          <div class="secondary-row pen-actions-row">
            <button id="changePenBtn" type="button">ChangePen</button>
            <button id="resetBtn" type="button">Reset distance</button>
          </div>
        </div>
      </section>
    </section>

    <section class="card">
      <h2>Configuration Message</h2>
      <p id="configMessage" class="muted">Settings are saved automatically in this browser.</p>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/configuration.js"></script>
</body>
</html>
